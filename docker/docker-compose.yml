# Docker compose for local analytics environment
# Services:
# - clickhouse-server
# Requirements:
# - persist data to a named volume
# - expose 8123 and 9000
# - restart automatically
# - minimal config for development

services:
  clickhouse-server:
    image: clickhouse/clickhouse-server:latest
    container_name: taxisbi-clickhouse
    restart: unless-stopped
    environment:
      #CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: 1
      CLICKHOUSE_DB: taxisbi
      CLICKHOUSE_USER: taxisbi
      CLICKHOUSE_PASSWORD: ajaxiscool
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query \"EXISTS DATABASE $${CLICKHOUSE_DB}\" | grep -q '^1$'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  clickhouse-data: